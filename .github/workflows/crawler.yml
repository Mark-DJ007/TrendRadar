name: Hot News Crawler

on:
  schedule:
    # 我们使用的是 github 官方提供的资源来进行的推送，而每个账号的资源是限额的，为了不被官方判定为滥用而面临封号的风险，不建议比半小时更低
    - cron: "0 * * * *" # 每小时整点运行一次(实际有偏差) 或者 "*/30 * * * *" (每半小时执行一次) 或者 "*/30 0-14 * * *"(每天早上 8 点到晚上 10 点期间，每半小时运行一次)
  workflow_dispatch:

# 添加权限设置
permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify required files
        run: |
          echo "🔍 检查必需的配置文件..."

          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 文件不存在"
            echo "请参考项目文档创建配置文件"
            exit 1
          fi

          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 文件不存在"
            echo "请参考项目文档创建频率词配置文件"
            exit 1
          fi

          echo "✅ 配置文件检查通过"

      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GITHUB_ACTIONS: true
        run: python main.py

    - name: Convert txt to JSON and upload to Gist
  run: |
    # 查找最新的 .txt 文件（按时间排序）
    LATEST_TXT=$(ls output/*/txt/*.txt | sort -r | head -1)
    
    if [ ! -f "$LATEST_TXT" ]; then
      echo "❌ 未找到最新的 .txt 文件"
      exit 1
    fi

    echo "✅ 找到文件: $LATEST_TXT"

    # 创建临时 Python 脚本
    cat > convert.py << 'EOF'
import re
import json
import sys

with open(sys.argv[1], 'r', encoding='utf-8') as f:
    content = f.read()

# 使用正则匹配每条新闻：标题\n来源\n链接\n---
pattern = r'(.*?)\n(.*?)\n(https?://[^\n]+)\n---'
matches = re.findall(pattern, content, re.DOTALL)

news_list = []
for title, source, url in matches:
    news_list.append({
        'title': title.strip(),
        'source': source.strip(),
        'url': url.strip()
    })

# 输出为 JSON
print(json.dumps(news_list, ensure_ascii=False, indent=2))
EOF

    # 执行转换脚本
    python3 convert.py "$LATEST_TXT" > hot_news.json

    # 验证是否生成成功
    if [ ! -f "hot_news.json" ]; then
      echo "❌ JSON 转换失败"
      exit 1
    fi

    # 获取 Gist Token
    GIST_TOKEN=${{ secrets.GIST_TOKEN }}

    # 上传到 Gist
    curl -s -X POST \
      -H "Authorization: token $GIST_TOKEN" \
      -d '{
        "description": "Auto-updated hot news from TrendRadar",
        "public": true,
        "files": {
          "hot_news.json": {
            "content": "$(cat hot_news.json)"
          }
        }
      }' \
      https://api.github.com/gists
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update by GitHub Actions at $(TZ=Asia/Shanghai date)" && git push)
