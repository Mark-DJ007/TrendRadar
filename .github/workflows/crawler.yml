name: Hot News Crawler
 
on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  push:
    branches: [ master ]
 
permissions:
  contents: write
 
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
 
      - name: Verify config files
        run: |
          echo "✅ 检查必需的配置文件..."
          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 不存在"
            exit 1
          fi
          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 不存在"
            exit 1
          fi
          echo "✅ 配置文件检查通过"
 
      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GITHUB_ACTIONS: true
        run: python main.py
 
      - name: Convert to JSON & Upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # --- 1. 查找最新 .txt 文件 (使用更稳健的方式) ---
          LATEST_TXT=$(find output -name "*.txt" -type f -printf "%T@ %p\n" | sort -n | tail -1 | cut -d' ' -f2-)
          if [ -z "$LATEST_TXT" ] || [ ! -f "$LATEST_TXT" ]; then
            echo "❌ 未找到新闻文件，请检查爬虫输出"
            exit 1
          fi
          echo "✅ 找到文件: $LATEST_TXT"
          
          # --- 2. 转换为 JSON ---
          python scripts/convert_to_json.py "$LATEST_TXT" > hot_news.json
          if [ ! -s hot_news.json ]; then
            echo "❌ JSON 转换失败或结果为空"
            # 打印文件内容用于调试
            cat hot_news.json
            exit 1
          fi
          echo "✅ JSON 转换成功，内容如下："
          cat hot_news.json
          
          # --- 3. 创建 Gist API 的 payload 文件 (安全方式) ---
          jq --arg content "$(cat hot_news.json)" \
            '{
              "description": "TrendRadar Hot News - '"$(date -u)"'",
              "public": false,
              "files": {
                "hot_news.json": {
                  "content": $content
                }
              }
            }' > payload.json
          
          # --- 4. 上传到 Gist ---
          curl_response=$(curl -s -X POST \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d @payload.json \
            https://api.github.com/gists)
            
          # --- 5. 检查上传结果 (关键！) ---
          if echo "$curl_response" | jq -e '.id' > /dev/null; then
            GIST_URL=$(echo "$curl_response" | jq -r '.html_url')
            echo "✅ Gist 上传成功: $GIST_URL"
          else
            echo "❌ Gist 上传失败，服务器响应："
            echo "$curl_response"
            exit 1
          fi
 
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Actions'
          git add -A
          git diff --quiet || git commit -m "Auto-update at $(date -u)"
          git push
