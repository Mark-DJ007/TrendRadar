name: Hot News Crawler
 
on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  push:
    branches: [ master ]
 
permissions:
  contents: write
 
jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
 
      - name: Verify config files
        run: |
          echo "✅ 检查必需的配置文件..."
          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 不存在"
            exit 1
          fi
          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 不存在"
            exit 1
          fi
          echo "✅ 配置文件检查通过"
 
      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GITHUB_ACTIONS: true
        run: python main.py
 
      - name: Diagnose: Print raw TXT content
        run: |
          echo "🔍 正在寻找最新的 .txt 文件..."
          
          # 调用我们新创建的、独立的Python脚本来查找文件
          LATEST_TXT=$(python scripts/find_latest_file.py)
 
          # 检查脚本是否成功找到了文件
          if [ ! -f "$LATEST_TXT" ]; then
            echo "❌ 未能找到任何 .txt 文件，或者查找脚本出错。"
            exit 1
          fi
          
          echo "✅ 找到文件: $LATEST_TXT"
          echo "=========================================================="
          echo "🔍 以下是 .txt 文件的【原始内容】，请完整复制给我："
          echo "=========================================================="
          cat "$LATEST_TXT"
 
      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Actions'
          git add -A
          git diff --quiet || git commit -m "Auto-update at $(date -u)"
          git push
