name: Hot News Crawler

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify required config files
        run: |
          echo "✅ 检查必需的配置文件..."
          if [ ! -f config/config.yaml ]; then
            echo "❌ 错误: config/config.yaml 文件不存在"
            exit 1
          fi
          if [ ! -f config/frequency_words.txt ]; then
            echo "❌ 错误: config/frequency_words.txt 文件不存在"
            exit 1
          fi
          echo "✅ 配置文件检查通过"

      - name: Run crawler
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GITHUB_ACTIONS: true
        run: python main.py

      - name: Convert latest txt to JSON and upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # 查找最新的 .txt 文件（按修改时间倒序）
          LATEST_TXT=$(find output -name "*.txt" -type f -print0 | xargs -0 ls -t 2>/dev/null | head -n 1)
          
          if [ -z "$LATEST_TXT" ] || [ ! -f "$LATEST_TXT" ]; then
            echo "❌ 未找到任何 .txt 文件，请确认爬虫是否成功生成输出"
            exit 1
          fi

          echo "✅ 找到最新新闻文件: $LATEST_TXT"

          # 使用外部脚本转换为 JSON
          python scripts/convert_to_json.py "$LATEST_TXT" > hot_news.json

          if [ ! -s hot_news.json ]; then
            echo "❌ 转换失败：hot_news.json 为空或未生成"
            exit 1
          fi

          echo "✅ JSON 转换成功"

          # 上传到 Gist
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GIST_TOKEN" \
            -d '{
              "description": "Auto-updated hot news from TrendRadar",
              "public": true,
              "files": {
                "hot_news.json": {
                  "content": "'"$(cat hot_news.json)"'"
                }
              }
            }' \
            https://api.github.com/gists)

          # 提取 Gist URL
          GIST_URL=$(echo "$RESPONSE" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    print(data.get('html_url', '未知'))
except:
    print('上传失败，请检查 GIST_TOKEN 权限')
    sys.exit(1)
")
          echo "✅ Gist 已上传: $GIST_URL"

      - name: Commit and push any changes (e.g., logs, outputs)
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update by GitHub Actions at $(TZ=Asia/Shanghai date)" && git push)
